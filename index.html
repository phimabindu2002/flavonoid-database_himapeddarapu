    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #2d3748; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #718096; margin-bottom: 25px; }
        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .search-box:focus { outline: none; border-color: #667eea; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: #f7fafc;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-color: #667eea;
        }
        .card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            background: white;
            border-radius: 8px;
            padding: 10px;
        }
        .card h3 { 
            color: #2d3748; 
            font-size: 0.95rem; 
            margin: 10px 0 5px;
            word-break: break-word;
        }
        .card .info { font-size: 0.8rem; color: #4a5568; }
        .detail {
            display: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .detail.active { display: block; }
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }
        .detail-grid .info { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; }
        .detail-grid .info-item { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .detail-grid img { max-width: 100%; max-height: 250px; border-radius: 8px; background: white; padding: 10px; }
        .no-results { text-align: center; padding: 40px; color: #718096; }
        .suggestions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
        .suggestion {
            padding: 8px 18px;
            background: #edf2f7;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .suggestion:hover { background: #667eea; color: white; }
        .status {
            text-align: center;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            display: none;
        }
        .status.success { background: #c6f6d5; color: #22543d; display: block; }
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .loading i {
            font-size: 2rem;
            color: #667eea;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 768px) {
            .detail-grid { grid-template-columns: 1fr; }
            .container { padding: 15px; }
        }
    </style>

        // ============================================
        // IMAGE FUNCTIONS
        // ============================================
        
        function getImageUrl(compoundName) {
            if (!compoundName) return IMAGE_FOLDER + 'default.jpg';
            
            let name = compoundName.trim();
            
            const variations = [
                name,
                name.replace(/ /g, ''),
                name.replace(/ /g, '-'),
                name.replace(/ /g, '_'),
                name.toLowerCase(),
                name.toLowerCase().replace(/ /g, ''),
                name.toLowerCase().replace(/ /g, '-'),
                name.toLowerCase().replace(/ /g, '_'),
            ];
            
            const uniqueVariations = [...new Set(variations)];
            const extensions = ['.jpg', '.jpeg', '.png'];
            
            for (let ext of extensions) {
                for (let v of uniqueVariations) {
                    return IMAGE_FOLDER + encodeURIComponent(v + ext);
                }
            }
            
            return IMAGE_FOLDER + 'default.jpg';
        }

        // ============================================
        // DISPLAY FUNCTIONS
        // ============================================
        
        function displayAll() {
            displayResults(database);
        }

        function displayResults(results) {
            const grid = document.getElementById('results');
            const noResults = document.getElementById('noResults');
            
            if (!results || results.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            
            grid.innerHTML = results.map(c => {
                const imageUrl = getImageUrl(c.name);
                return `
                    <div class="card" onclick="showDetail(${c.id})">
                        <img src="${imageUrl}" 
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%23f7fafc%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%234a5568%22 font-size=%2214%22%3ENo Image%3C/text%3E%3C/svg%3E'"
                             alt="${c.name}">
                        <h3>${c.name}</h3>
                        <div class="info">Formula: ${c.formula || 'N/A'}</div>
                        <div class="info">MW: ${c.weight || 'N/A'}</div>
                        <div class="info">Elements: ${c.elements || 'N/A'}</div>
                    </div>
                `;
            }).join('');
        }

        function showDetail(id) {
            const c = database.find(d => d.id === id);
            if (!c) return;
            
            const detail = document.getElementById('detail');
            const imageUrl = getImageUrl(c.name);
            
            detail.innerHTML = `
                <h2>${c.name}</h2>
                <div class="detail-grid">
                    <div>
                        <div class="info">
                            <div class="info-item"><strong>Type:</strong> ${c.type || 'N/A'}</div>
                            <div class="info-item"><strong>Formula:</strong> ${c.formula || 'N/A'}</div>
                            <div class="info-item"><strong>Weight:</strong> ${c.weight || 'N/A'} g/mol</div>
                            <div class="info-item"><strong>Heavy Atoms:</strong> ${c.heavyAtoms || 'N/A'}</div>
                            <div class="info-item"><strong>Elements:</strong> ${c.elements || 'N/A'}</div>
                            <div class="info-item"><strong>SMILES:</strong> <small style="word-break:break-all;">${c.smiles || 'N/A'}</small></div>
                        </div>
                    </div>
                    <div>
                        <img src="${imageUrl}" 
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22%3E%3Crect width=%22300%22 height=%22300%22 fill=%22%23f7fafc%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%234a5568%22 font-size=%2216%22%3ENo Image%3C/text%3E%3C/svg%3E'"
                             alt="${c.name}">
                        <p style="margin-top:10px; font-size:0.9rem; opacity:0.8;">${c.name}</p>
                    </div>
                </div>
            `;
            detail.classList.add('active');
            detail.scrollIntoView({ behavior: 'smooth' });
        }

        // ============================================
        // SEARCH
        // ============================================
        
        function searchFlavonoids() {
            const term = document.getElementById('search').value.toLowerCase().trim();
            if (!term) {
                displayResults(database);
                document.getElementById('detail').classList.remove('active');
                return;
            }
            
            const results = database.filter(c => {
                const searchable = [
                    c.name, c.type, c.formula, c.smiles, c.elements, 
                    c.source, c.activity, c.weight, c.heavyAtoms
                ].join(' ').toLowerCase();
                return searchable.includes(term);
            });
            
            displayResults(results);
            document.getElementById('detail').classList.remove('active');
        }

        function searchTerm(term) {
            document.getElementById('search').value = term;
            searchFlavonoids();
        }

        // ============================================
        // UTILITY
        // ============================================
        
        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = `status ${type}`;
            setTimeout(() => { status.className = 'status'; }, 5000);
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        
        document.getElementById('search').addEventListener('input', searchFlavonoids);
        
        // Load data
        initDatabase();
        
        console.log('🔬 Flavonoid Database Ready!');
    </script>
</body>
</html>
